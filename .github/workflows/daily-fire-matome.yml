name: Daily FIRE matome publish

on:
  schedule:
    # 06:00 JST
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run collect:quiet
      - run: npm run prepare:upload
      - name: Commit generated articles
        run: |
          git config user.name "fire-matome-bot"
          git config user.email "fire-matome-bot@example.com"
          git add data/articles.generated.js articles sitemap.xml
          git diff --cached --quiet || git commit -m "Generate daily FIRE matome draft"
          git push
      - name: Validate FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          missing=0
          for name in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_SERVER_DIR; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is not set in repository secrets."
              missing=1
            fi
          done
          exit "$missing"
      - name: Deploy to Shin Rental Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
