name: Daily FIRE matome publish

on:
  schedule:
    # 06:00 JST
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run collect:quiet
      - run: npm run prepare:upload
      - name: Commit generated articles
        run: |
          git config user.name "fire-matome-bot"
          git config user.email "fire-matome-bot@example.com"
          git add data/articles.generated.js articles sitemap.xml
          git diff --cached --quiet || git commit -m "Generate daily FIRE matome draft"
          git push
      - name: Deploy to Shin Rental Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
